<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POWELL | Solutions Premium</title>
    <style>
        /* Design général inspiré de la clarté des plateformes pros */
        body { font-family: 'Inter', sans-serif; margin: 0; background-color: #f7f7f7; color: #333; }
        header { background: #fff; padding: 20px; text-align: center; border-bottom: 2px solid #e0e0e0; position: sticky; top: 0; z-index: 1000; }
        
        /* Animation du carrousel */
        .slider-container { overflow: hidden; padding: 40px 0; background: #fff; }
        .slider { display: flex; animation: slide 20s linear infinite; gap: 20px; }
        @keyframes slide { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        
        .card { min-width: 280px; background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        
        /* Bouton dynamique */
        .btn-order { background: #2c3e50; color: #fff; padding: 12px; border: none; border-radius: 6px; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-order:hover { background: #d4af37; }

        /* Loader */
        .loader { display: none; margin: 50px auto; border: 6px solid #f3f3f3; border-top: 6px solid #d4af37; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        footer { background: #1a1a1a; color: #888; padding: 40px; text-align: center; font-size: 0.8em; }
    </style>
</head>
<body>

<header>
    <h1 style="color:#d4af37; margin:0;">POWELL</h1>
    <p>Expertise & Solutions Premium</p>
</header>

<div class="slider-container">
    <div class="slider" id="catalogue">
        <!-- Répétition des produits pour l'effet de défilement infini -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1610945415247-a19368028741?w=400" alt="Prod">
            <h3>Station Charge Pro</h3>
            <p><strong>129 €</strong></p>
            <button class="btn-order" onclick="commander('Station Charge')">Commander</button>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1593642634367-d95a832e87d6?w=400" alt="Prod">
            <h3>Support Alu Ergonomique</h3>
            <p><strong>99 €</strong></p>
            <button class="btn-order" onclick="commander('Support Alu')">Commander</button>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1599305445671-ac291c95aaa9?w=400" alt="Prod">
            <h3>Tondeuse Titane</h3>
            <p><strong>89 €</strong></p>
            <button class="btn-order" onclick="commander('Tondeuse')">Commander</button>
        </div>
        <!-- Doublon pour l'effet de mouvement continu -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1610945415247-a19368028741?w=400" alt="Prod">
            <h3>Station Charge Pro</h3>
            <p><strong>129 €</strong></p>
            <button class="btn-order" onclick="commander('Station Charge')">Commander</button>
        </div>
    </div>
</div>

<div id="loader" class="loader"></div>
<div id="message" style="text-align:center; padding: 50px;"></div>

<footer>
    <p>POWELL SASU | Louviers, France | SIREN : 488 254 798</p>
    <p>Le paiement s'effectue sur facture proforma après validation de votre commande.</p>
</footer>

<script>
    function commander(nom) {
        document.querySelector('.slider-container').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            const ref = 'POW-' + Math.floor(Math.random()*99999);
            document.getElementById('message').innerHTML = `
                <div style="background:#fff; padding:30px; border-radius:10px; border:1px solid #d4af37;">
                    <h2 style="color:#d4af37;">Commande Enregistrée !</h2>
                    <p>Produit : ${nom}</p>
                    <p>Code de référence : <strong>${ref}</strong></p>
                    <p>Votre facture est en cours de génération.</p>
                </div>`;
        }, 2000);
    }
</script>
</body>
</html>
