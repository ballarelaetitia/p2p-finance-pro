<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P FINANCE PRO</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f4f8; color: #002e5b; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { text-align: center; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        
        /* ICI LE SÉLECTEUR DE MONTANT DÉBLOQUÉ */
        select, input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #002e5b; 
            border-radius: 5px; 
            font-size: 16px; /* Taille minimum pour éviter le zoom automatique sur iPhone */
            background: white;
        }

        .btn { 
            display: block; 
            width: 100%; 
            padding: 15px; 
            margin-top: 10px; 
            text-align: center; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
            color: white;
            border: none;
            cursor: pointer;
        }
        .btn-wa { background: #25D366; }
        .btn-mail { background: #002e5b; }
        
        .team-list { margin-top: 20px; font-size: 0.8rem; background: #eef; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🏛️ P2P FINANCE PRO</h2>
        <p style="text-align:center; font-size: 0.8rem;">📍 14 Avenue de l'Opéra, Paris</p>

        <div class="input-group">
            <label>Votre Nom</label>
            <input type="text" id="nom_client" placeholder="Nom et Prénom">
        </div>

        <div class="input-group">
            <label>Montant (Défilez avec votre doigt)</label>
            <select id="montant_client">
                <option value="1000">1 000 €</option>
                <option value="2000">2 000 €</option>
                <option value="3000">3 000 €</option>
                <option value="4000">4 000 €</option>
                <option value="5000">5 000 €</option>
                <option value="10000">10 000 €</option>
                <option value="20000">20 000 €</option>
                <option value="30000">30 000 €</option>
                <option value="50000">50 000 €</option>
                <option value="75000">75 000 €</option>
            </select>
        </div>

        <button onclick="ouvrirWhatsApp()" class="btn btn-wa">📱 CONTACT WHATSAPP</button>
        <button onclick="ouvrirEmail()" class="btn btn-mail">✉️ CONTACT EMAIL</button>

        <div class="team-list">
            <b>DIRECTION FAMILIALE :</b><br>
            • David Ballare (Associé)<br>
            • Laetitia Ballare (Générale)<br>
            • Frank Martin (Analyste)<br>
            • Sabrina Rodriguez (Secrétaire)<br>
            • Sandy Macia (Garanties)
        </div>
    </div>

    <script>
        function ouvrirWhatsApp() {
            var n = document.getElementById('nom_client').value;
            var m = document.getElementById('montant_client').value;
            if(n == "") { alert("Inscrivez votre nom"); return; }
            
            // LIEN DIRECT SANS INTERMÉDIAIRE
            var url = "https://api.whatsapp.com/send?phone=33780976404&text=Bonjour, je suis " + n + ". Je souhaite un prêt de " + m + " euros.";
            window.location.href = url;
        }

        function ouvrirEmail() {
            var n = document.getElementById('nom_client').value;
            var m = document.getElementById('montant_client').value;
            
            var mailto_link = "mailto:direction@p2p-finance-pro.com?subject=Demande de prêt&body=Nom: " + n + "%0AMontant: " + m + " euros";
            window.location.href = mailto_link;
        }
    </script>

</body>
</html>
