<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POWELL | Marketplace Pro</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f4f4f4; }
        
        /* HEADER */
        .header { background: #131921; color: white; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .burger { font-size: 25px; cursor: pointer; margin-right: 20px; }
        .search-bar { flex-grow: 1; padding: 10px; border-radius: 4px; border: none; }

        /* MENU LATÉRAL (FONCTIONNEL) */
        .sidebar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: #111; overflow-x: hidden; transition: 0.3s; padding-top: 60px; z-index: 200; }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 20px; color: #fff; display: block; }
        .sidebar a:hover { background: #d4af37; }

        /* GRILLE DENSE */
        .catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 10px; }
        .item { background: white; padding: 10px; text-align: center; border-radius: 4px; }
        .item img { width: 100%; height: 150px; object-fit: cover; }
        .item h4 { font-size: 13px; margin: 10px 0; }
    </style>
</head>
<body>

<div id="sideNav" class="sidebar">
    <a href="javascript:void(0)" onclick="closeNav()">× Fermer</a>
    <a href="#">Compte</a>
    <a href="#">Commandes</a>
    <a href="#">CGV</a>
    <a href="#">Contact</a>
</div>

<header class="header">
    <div class="burger" onclick="openNav()">☰</div>
    <input type="text" id="search" class="search-bar" placeholder="Rechercher..." onkeyup="search()">
</header>

<div class="catalog" id="catalog">
    <!-- Liste complète -->
    <div class="item" data-name="Station Charge"><img src="https://picsum.photos/200/200?1"><h4>Station Charge</h4></div>
    <div class="item" data-name="Support PC"><img src="https://picsum.photos/200/200?2"><h4>Support PC</h4></div>
    <div class="item" data-name="Tondeuse"><img src="https://picsum.photos/200/200?3"><h4>Tondeuse</h4></div>
    <div class="item" data-name="Casque"><img src="https://picsum.photos/200/200?4"><h4>Casque</h4></div>
    <div class="item" data-name="Montre"><img src="https://picsum.photos/200/200?5"><h4>Montre</h4></div>
    <div class="item" data-name="Clavier"><img src="https://picsum.photos/200/200?6"><h4>Clavier</h4></div>
</div>

<script>
    function openNav() { document.getElementById("sideNav").style.width = "250px"; }
    function closeNav() { document.getElementById("sideNav").style.width = "0"; }
    function search() {
        let val = document.getElementById('search').value.toLowerCase();
        let items = document.getElementsByClassName('item');
        for (let i of items) {
            i.style.display = i.getAttribute('data-name').toLowerCase().includes(val) ? "" : "none";
        }
    }
</script>
</body>
</html>
