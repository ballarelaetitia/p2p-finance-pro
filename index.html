<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINANCIÈRE DE CEZEMBRE | Solutions de Crédit</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --navy: #001A4D; 
            --gold: #C5A059; 
            --white: #FFFFFF; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        /* GARANTIE : VOS ARRIÈRE-PLANS NE BOUGENT PAS */
        .hero {
            height: 100vh;
            width: 100%;
            /* L'image est fixée et couvre tout l'écran sans réduction */
            background: linear-gradient(rgba(0,26,77,0.7), rgba(0,26,77,0.7)), 
                        url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; 
            align-items: center; 
            padding: 0 8%; 
            color: white;
        }

        /* HEADER AUTHENTIQUE */
        header {
            background: white; 
            padding: 20px 8%; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
            position: fixed; 
            width: 100%; 
            z-index: 1000;
        }

        /* SIMULATEUR À SA PLACE (À DROITE) */
        .simulator {
            background: white; 
            padding: 40px; 
            width: 450px;
            color: var(--navy); 
            margin-left: auto; /* Garde la position à droite */
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-radius: 2px;
        }

        /* TRADUCTION INVISIBLE (NE TOUCHE PAS AU DESIGN) */
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
        
        .legal-badge {
            background: #FFD700; 
            color: #000; 
            padding: 3px 10px; 
            border-radius: 3px; 
            font-weight: 700; 
            font-size: 0.75rem; 
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div id="google_translate_element" style="display:none;"></div>

<header>
    <div class="logo" style="font-weight:700; color:var(--navy); font-size:1.3rem;">FINANCIÈRE DE CEZEMBRE</div>
    <div style="cursor:pointer; font-size:0.85rem; font-weight:600; color:var(--navy);" onclick="var el = document.querySelector('.goog-te-menu-value span'); if(el) el.click();">
        <i class="fas fa-globe"></i> FRANCE / INTERNATIONAL
    </div>
</header>

<section class="hero">
    <div class="hero-content">
        <div style="color:var(--gold); font-size:0.8rem; letter-spacing:3px; margin-bottom:15px; font-weight:700;">BIENVENUE / WELCOME</div>
        
        <h1 style="font-size:3.2rem; line-height:1.1; margin-bottom:25px;">L'excellence financière <br>au service de vos projets.</h1>
        
        <div style="display: flex; align-items: center; margin-top: 30px;">
            <span class="legal-badge">OFFICIEL</span>
            <p style="font-size:1rem; opacity:0.9; font-weight:600;">RCS 552 058 943 - Siège en France</p>
        </div>
    </div>

    <div class="simulator">
        <h3 style="margin-bottom:25px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; display: inline-block;">Demande de Crédit</h3>
        
        <form action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="55707e6c-f919-4972-bf3e-fba1cf0e51e9">
            
            <div style="margin-bottom:15px;">
                <label style="font-size:0.75rem; font-weight:700; display:block; margin-bottom:5px;">TYPE DE PROJET</label>
                <select name="projet" style="width:100%; padding:12px; border:1px solid #ddd; background:#f9f9f9;" required>
                    <option value="Personnel">Prêt Personnel</option>
                    <option value="Immobilier">Prêt Immobilier</option>
                    <option value="Auto">Auto / Moto</option>
                    <option value="Travaux">Travaux / Rénovation</option>
                    <option value="Autre">Autre projet spécifique</option> </select>
            </div>

            <input type="text" name="nom" placeholder="Votre Nom et Prénom" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #ddd;" required>
            <input type="email" name="email" placeholder="Votre adresse e-mail" style="width:100%; padding:12px; margin-bottom:20px; border:1px solid #ddd;" required>
            
            <button type="submit" style="background:var(--navy); color:white; width:100%; padding:18px; border:none; font-weight:700; cursor:pointer; font-size:1rem; transition: 0.3s;">
                VALIDER MA DEMANDE
            </button>
        </form>
    </div>
</section>

<script type="text/javascript">
    function googleTranslateElementInit() {
        new google.translate.TranslateElement({
            pageLanguage: 'fr', 
            autoDisplay: true 
        }, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
